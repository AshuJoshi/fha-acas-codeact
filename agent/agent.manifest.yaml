name: fha-acas-codeact
description: >
  Step 1 CodeAct hosted agent for FHA. Exposes a stub execute_code tool
  and returns placeholder output; no ACA Sandbox execution is wired yet.
metadata:
  tags:
    - Agent Framework
    - FHA
    - Responses Protocol
    - CodeAct
    - Step1
template:
  name: fha-acas-codeact
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: ACAS_SUBSCRIPTION_ID
      value: "{{ACAS_SUBSCRIPTION_ID}}"
    - name: ACAS_RESOURCE_GROUP
      value: "{{ACAS_RESOURCE_GROUP}}"
    - name: ACAS_SANDBOX_GROUP
      value: "{{ACAS_SANDBOX_GROUP}}"
    - name: ACAS_LOCATION
      value: "{{ACAS_LOCATION}}"
    - name: ACAS_DISK
      value: "{{ACAS_DISK}}"
resources:
  - kind: model
    id: gpt-5.4
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
