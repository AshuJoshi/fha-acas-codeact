# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.0-preview'
name: fha-acas-codeact
services:
    fha-acas-codeact:
        project: agent
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "0.5"
                    memory: 1Gi
            deployments:
                - model:
                    format: OpenAI
                    name: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
                    version: ${AZURE_AI_MODEL_VERSION}
                  name: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
                  sku:
                    capacity: 10
                    name: ${AZURE_AI_MODEL_SKU_NAME}
            startupCommand: python main.py
infra:
    provider: bicep
    path: infra
    module: main
hooks:
    postdeploy:
        name: postdeploy
        kind: sh
        shell: sh
        run: ./scripts/grant_agent_roles.sh
        interactive: true
